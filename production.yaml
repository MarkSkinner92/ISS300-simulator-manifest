services:
  core:
    image: markskinner92/iss300-simulator-core:v1.3.1
    build:
      context: ./services/core
    container_name: core
    depends_on:
      - modbus
    restart: unless-stopped
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env

  modbus:
    image: markskinner92/iss300-simulator-modbus:v1.0.6
    build:
      context: ./services/modbus
      dockerfile: Dockerfile
    container_name: modbus
    restart: unless-stopped
    networks:
      - app-network
    devices:
      - "${MODBUS_PORT}:${MODBUS_PORT}"
    env_file:
      - .env
    environment:
      - DEBUG_MODE=0
    group_add:
      - dialout

  gui-gateway:
    image: markskinner92/iss300-simulator-gui-gateway:v1.2.0
    build:
      context: ./services/gui
      dockerfile: Dockerfile.gateway
    container_name: gui-gateway
    restart: unless-stopped
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
      - "7074:7074"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - DEBUG_MODE=0

  gui-frontend-prod:
    image: markskinner92/iss300-simulator-gui-frontend-prod:v1.3.0
    build:
      context: ./services/gui/frontend
      dockerfile: Dockerfile.frontend.prod
    container_name: gui-frontend-prod
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "5173:5173"

  network-controller:
    image: markskinner92/iss300-simulator-network-controller:v1.3.0
    build:
      context: ./services/network-controller
    container_name: network-controller
    restart: unless-stopped
    privileged: true
    network_mode: "host"  # keeps using 127.0.0.1 for redis, no change needed
    volumes:
      - /var/run/dbus:/var/run/dbus
      - /etc/NetworkManager/system-connections:/etc/NetworkManager/system-connections:rw
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://127.0.0.1:6379
      - SYSTEM_CONNECTIONS_DIR=/etc/NetworkManager/system-connections

networks:
  app-network:
    external: true  # tells compose this network was created outside of compose