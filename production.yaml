services:
  # The Logic Engine
  core:
    image: markskinner92/iss300-simulator-core:0.1.1
    build:
      context: ./services/core
    container_name: core
    depends_on:
      - redis
      - modbus
    restart: unless-stopped
    env_file:
      - .env
      
  # The Database / Message Bus
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 1s
      retries: 20
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379" # Still expose to host so you can use redis-cli locally

  # Modbus bridge
  modbus:
    image: markskinner92/iss300-simulator-modbus:0.1.1
    build:
      context: ./services/modbus
      dockerfile: Dockerfile
    container_name: modbus
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    devices:
      - "${MODBUS_PORT}:${MODBUS_PORT}"
    env_file:
      - .env
    environment:
      - DEBUG_MODE=0
    group_add:
      - dialout

  # The Socket.io <-> Redis Bridge
  gui-gateway:
    image: markskinner92/iss300-simulator-gui-gateway:0.1.1
    build:
      context: ./services/gui
      dockerfile: Dockerfile.gateway
    container_name: gui-gateway
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000" # for the socket.io server
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - DEBUG_MODE=0

  # The Vue.js Development Server
  gui-frontend:
    image: markskinner92/iss300-simulator-gui-frontend:v0.1.3
    build:
      context: ./services/gui/frontend
      dockerfile: Dockerfile.frontend
    container_name: gui-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5173 || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s # Gives the dev server a head start before failing
    ports:
      - "5173:5173"

  # Manages external network connectivity
  network-controller:
    image: markskinner92/iss300-simulator-network-controller:0.1.1
    build:
      context: ./services/network-controller
    container_name: network-controller
    restart: unless-stopped
    # Privileged is often needed to change hardware states (WiFi/Ethernet)
    privileged: true
    network_mode: "host" 
    volumes:
      # This allows the container to talk to the host's NetworkManager
      - /var/run/dbus:/var/run/dbus
      - /etc/NetworkManager/system-connections:/etc/NetworkManager/system-connections:rw
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://127.0.0.1:6379 # Since network_mode is 'host', use 127.0.0.1
      - SYSTEM_CONNECTIONS_DIR=/etc/NetworkManager/system-connections